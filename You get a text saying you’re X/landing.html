<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frictionless Cafe QR Check-In</title>
  <link rel="stylesheet" href="style.css?v=11" />
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Frictionless Cafe Logo" class="logo" width="48" height="48" />

    <h1>Frictionless Cafe Rewards</h1>
    <p>No app. No hassle. Just rewards.</p>

    <div class="card">
      <h2>Scan to Check In</h2>

      <a href="index.html" class="qr-link">
        <img src="qr.png" alt="QR code for Frictionless Cafe Rewards" class="qr-image" />
      </a>

      <p class="qr-text">Scan me! (Click on me since this is a simulation)</p>
    </div>
  </div>
</body>
</html>
