<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frictionless Cafe Rewards</title>

  <!-- cache-busted CSS -->
  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body>
  <div class="container">

    <!-- LOGO (FORCED SMALL) -->
    <img 
      src="logo.png" 
      alt="Frictionless Cafe Logo" 
      class="logo"
      width="48"
      height="48"
    />

    <h1>Frictionless Cafe Rewards</h1>
    <p>No app. No hassle. Just rewards.</p>

    <div class="card">
      <h2>Join Our Rewards Program</h2>
      <p>Enter your 10-digit phone number below.</p>

      <form id="rewardsForm">
        <input
          type="tel"
          id="phone"
          placeholder="(555) 555-5555"
          maxlength="14"
          required
        />
        <button type="submit">Join Rewards</button>
      </form>

      <p id="message"></p>
    </div>
  </div>

<script src="script.js?v=3"></script>
</body>
</html>
