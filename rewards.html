<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rewards</title>
  <link rel="stylesheet" href="style.css?v=30" />
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
</head>
<body>
  <div class="container">
    <img src="logo.png" class="logo" />

    <h1>Frictionless Cafe Rewards</h1>

    <div class="card">
      <form id="form">
        <input id="phone" placeholder="(555) 555-5555" required />
        <button type="submit">Check In</button>
      </form>

      <div id="output"></div>

      <div id="barcodeBox" class="hidden">
        <p><strong>Your Member ID</strong></p>
        <p id="memberId"></p>
        <p>Show this barcode to your barista to earn your points.</p>
        <svg id="barcode"></svg>
      </div>
    </div>
  </div>

<script src="script.js?v=31"></script>
</body>
</html>
